name: Forzar Creacion Instancia Oracle

on:
  workflow_dispatch:

jobs:
  solicitar-vps:
    runs-on: ubuntu-latest
    steps:
    - name: Codigo del repositorio
      uses: actions/checkout@v4

    - name: Instalar y Configurar OCI CLI de forma Nativa
      env:
        OCI_USER: ${{ secrets.OCI_USER_OCID }}
        OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        OCI_REGION: "mx-monterrey-1"
        OCI_KEY_TEXT: ${{ secrets.OCI_API_KEY }}
      run: |
        bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/services/vcn/extensions/install.sh)" -- --accept-all-defaults
        echo "/home/runner/bin" >> $GITHUB_PATH
        export PATH=$PATH:/home/runner/bin
        mkdir -p ~/.oci
        echo "$OCI_KEY_TEXT" > ~/.oci/oci_api_key.pem
        chmod 600 ~/.oci/oci_api_key.pem
        
        cat << EOF > ~/.oci/config
        [DEFAULT]
        user=$OCI_USER
        fingerprint=$OCI_FINGERPRINT
        tenancy=$OCI_TENANCY
        region=$OCI_REGION
        key_file=/home/runner/.oci/oci_api_key.pem
        EOF
        
        chmod 600 ~/.oci/config

    - name: Ejecutar Reintentos Infinitos
      env:
        COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      run: |
        export PATH=$PATH:/home/runner/bin
        chmod +x ./crear_instancia.sh
        ./crear_instancia.sh
