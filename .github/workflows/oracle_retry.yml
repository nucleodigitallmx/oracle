- name: Ejecutar Reintentos Infinitos
      env:
        COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_OCID }}
      run: |
        export PATH=$PATH:/home/runner/bin
        
        echo "=== Verificando si OCI CLI está disponible ==="
        if command -v oci &> /dev/null; then
            echo "OCI CLI está instalado en: $(which oci)"
            oci --version
        else
            echo "Error: OCI CLI no se encuentra en el PATH actual."
            echo "PATH actual: $PATH"
        fi
        
        echo "=== Limpiando y ejecutando el script ==="
        sed -i 's/\r$//' ./crear_instancia.sh
        chmod +x ./crear_instancia.sh
        ./crear_instancia.sh
